<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="tableschool.css">
    <title>Tabela da escola</title>
</head>
<body>
  <table>
    <thead>
      <tr>
          <th rowspan="2" scope="rowgroup">Área</th>
          <th rowspan="2" scope="rowgroup">Disciplinas</th>
          <th colspan="2" scope="colgroup">Notas</th>
           <th rowspan="2" scope="rowgroup">Média</th>
      </tr>
      <tr>
        <th>Nota1</th>
        <th>Nota2</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th rowspan="4" scope="rowgroup">Exatas</th>
        <td>Matemática</td>
        <td>0.0</td>
        <td>0.0</td>
        <td>0.0</td>
      </tr>
      <tr>
        <td>Física</td>
        <td>0.0</td>
        <td>0.0</td>
        <td>0.0</td>
      </tr>
      <tr>
        <td>Biologia</td>
        <td>0.0</td>
        <td>0.0</td>
        <td>0.0</td>
      </tr>
      <tr>
        <td>Química</td>
        <td>0.0</td>
        <td>0.0</td>
        <td>0.0</td>
      </tr>
      <tr>
        <th colspan="4" scope="colgroup" class="materia">Média Exatas</th>
        <td class="materia">0.0</td>
      </tr>
      <tr>
        <th rowspan="2" scope="rowgroup">Humanas</th>
        <td>História</td>
        <td>0.0</td>
        <td>0.0</td>
        <td>0.0</td>
      </tr>
      <tr>
        <td>Geografia</td>
        <td>0.0</td>
        <td>0.0</td>
        <td>0.0</td>
      </tr>
      <tr>
       <th colspan="4" scope="colgroup" class="materia">Média de humanas</th>
       <td class="materia">0.0</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
